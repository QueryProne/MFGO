kind = "web"
previewPath = "/"
title = "ManufactureOS ERP"
version = "1.0.0"
id = "artifacts/erp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18996
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/erp run dev"

[services.env]
PORT = "18996"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/erp", "run", "build"]
publicDir = "artifacts/erp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
