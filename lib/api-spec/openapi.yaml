openapi: 3.1.0
info:
  title: Api
  version: 1.0.0
  description: ManufactureOS ERP API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: roles
    description: Role management
  - name: permissions
    description: Permission management
  - name: audit
    description: Audit logs
  - name: customers
    description: CRM customers
  - name: contacts
    description: CRM contacts
  - name: vendors
    description: Vendor management
  - name: items
    description: Item master
  - name: boms
    description: Bill of Materials
  - name: routings
    description: Manufacturing routings
  - name: workcenters
    description: Work centers
  - name: inventory
    description: Inventory management
  - name: quotes
    description: Quoting
  - name: salesorders
    description: Sales orders
  - name: purchaseorders
    description: Purchase orders
  - name: workorders
    description: Work orders
  - name: shipments
    description: Shipments
  - name: invoices
    description: Invoices
  - name: quality
    description: Quality management
  - name: mrp
    description: MRP engine
  - name: planning
    description: What-if planning
  - name: dashboard
    description: Dashboard
  - name: search
    description: Global search
  - name: smarttransfer
    description: Smart Transfer

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # USERS
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, locked]
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersListResponse"
    post:
      operationId: createUser
      tags: [users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    put:
      operationId: updateUser
      tags: [users]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deactivateUser
      tags: [users]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: User deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

